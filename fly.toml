# Fly.io configuration for blood-pressure-analyzer.
# Run `fly launch --no-deploy` once to claim a unique app name / region, or edit
# the two values below, then `fly deploy`.

app = "blood-pressure-analyzer"
primary_region = "waw"  # Warsaw; pick the closest: https://fly.io/docs/reference/regions/

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8501
  force_https = true
  # Scale to zero when idle so an idle personal app costs nothing.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # Streamlit keeps one long-lived WebSocket per session; keep machines from
  # being reaped while a user is connected.
  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 40

  # Fly stops/starts machines based on this HTTP health check.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/_stcore/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"  # pandas + plotly are comfortable here; bump to 1gb if OOM.
